<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tài Liệu Học Tập</title>
    <!-- Liên kết với file CSS để làm đẹp -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Thanh đầu trang -->
    <header>
        <h1>Chào mừng đến với Kho Tài Liệu!</h1>
        <p>Nơi tổng hợp các bài học, đề cương chất lượng nhất miễn phí.</p>
    </header>

    <!-- Khu vực chứa tài liệu -->
    <main>
        <div class="card-container">
            <!-- Tài liệu mẫu 1 -->
            <div class="card">
                <h3>📚 Tài Liệu Vật Lý</h3>
                <p>Tổng hợp công thức và đề cương ôn tập học kỳ.</p>
                <a href="https://drive.google.com/drive/folders/1mb1q_5e5_UsjQHHxNKmQxNtXGjppbrBX?usp=sharing" class="btn">Tải Ngay</a>
            </div>

            <!-- Tài liệu mẫu 2 -->
            <div class="card">
                <h3>📜 Đề Cương Lịch Sử</h3>
                <p>Tóm tắt các sự kiện trọng tâm bằng sơ đồ tư duy.</p>
                <a href="#" class="btn">Xem Chi Tiết</a>
            </div>
        </div>

        <!-- Nút tương tác thử nghiệm -->
        <button id="magic-btn">Bấm thử xem có gì?</button>
    </main>

    <!-- Liên kết với file JavaScript để tạo tính năng -->
    <script src="script.js"></script>
</body>
</html>
